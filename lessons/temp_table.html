
<!DOCTYPE html>
<html>
<head><title>Пример таблицы</title></head>
<body>
    <h1>Продажи продуктов</h1>
    <table id="sales-table" border="1">
        <thead>
            <tr>
                <th>Продукт</th>
                <th>Цена</th>
                <th>Количество</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ноутбук</td>
                <td>50000</td>
                <td>15</td>
            </tr>
            <tr>
                <td>Мышь</td>
                <td>500</td>
                <td>120</td>
            </tr>
            <tr>
                <td>Клавиатура</td>
                <td>1500</td>
                <td>80</td>
            </tr>
            <tr>
                <td>Монитор</td>
                <td>15000</td>
                <td>25</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
